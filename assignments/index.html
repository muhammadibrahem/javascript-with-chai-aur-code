        <link rel="stylesheet" href="style.css">

    <body>
        <nav>
            <a href="/" aria-current="page">Home</a>

        <div class="container">
            <h1>Temperature Converter</h1>
            <form>
                <p>
                    <label>Temperature in Celsius:</label>
                    <input type="text" id="celsius">
                </p>
                <button>Convert into Fahrenheit</button>
                <div id="results"></div>
            </form>
            <h3>Temperature Categories in Celsius</h3>
            <p>Cold=Less than 10</p>
            <p>Normal temperature=10 to 30</p>
            <p>Hot=Greater than 30</p>
        </div>
    </form>
</div>
